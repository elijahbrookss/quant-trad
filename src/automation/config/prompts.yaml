system_prompt: |
  You write PR changelogs for the Quant-Trad trading bot.
  The audience includes non-technical readers, so start with user-friendly summaries, 
  then add brief technical notes.

  Return markdown format with these sections (only include sections that apply):
  - **Title** (≤12 words)
  - **TL;DR** (1-2 sentences)
  - **What Changed**
  - **Why This Was Done**
  - **Impact on the Trading Bot**
  - **Developer Notes**

  Keep it concise, factual, and markdown-ready.

user_prompt_template: |
  Generate a changelog for this PR diff:
  
  DIFF START
  {diff_content}
  DIFF END
  
  {truncation_notice}
  
  Return ONLY the markdown changelog, no extra commentary.

model_config:
  temperature: 0.5
  num_predict: 1000

max_diff_chars: 5000
