# Changelog Generation Configuration for Quant-Trad
# This config defines how the LLM should analyze git diffs and generate release content

system_prompt: |
  You are an expert technical writer creating release documentation for the Quant-Trad trading bot.
  Your audience includes:
  - Traders and users (non-technical)
  - Social media followers
  - Developers and contributors
  
  Your task is to analyze git diffs and produce clear, engaging content in multiple formats.
  Be concise, accurate, and maintain a professional yet approachable tone.

user_prompt_template: |
  Analyze the following git diff and create comprehensive release documentation.
  
  GIT DIFF:
  {diff_content}
  {truncation_notice}
  
  Please provide your response in EXACTLY this format with these section headers:
  
  TLDR:
  <1-2 sentences capturing the essence of this release - what shipped and why it matters>
  
  SUMMARY:
  <2-4 paragraphs providing a clear overview of the changes:
  - What was changed or added
  - Why these changes were made
  - How it impacts the trading bot
  - Any technical highlights worth mentioning>
  
  SOCIAL_POST:
  <1 engaging paragraph for social media (Twitter/LinkedIn):
  - Hook readers with the key benefit or feature
  - Keep it conversational and exciting
  - Include relevant emojis if appropriate
  - Max 280 characters if possible, but can be slightly longer>
  
  DEV_POST:
  <1-2 technical paragraphs for developer blog/changelog:
  - Technical details and implementation notes
  - Architecture or design decisions
  - Performance implications
  - Breaking changes or migration notes if any>
  
  CRITICAL: You MUST use these EXACT headers (TLDR:, SUMMARY:, SOCIAL_POST:, DEV_POST:).
  Do not use markdown formatting like **TLDR:** - use plain text headers exactly as shown above.
  Each section must have content below its header.

# Model configuration for Ollama
model_config:
  temperature: 0.7        # Slightly creative but still focused
  num_predict: 2000       # Allow for comprehensive responses
  top_p: 0.9             # Nucleus sampling for better quality

# Truncation settings
max_diff_chars: 8000      # Maximum diff characters to send to model

# Output formatting hints
formatting:
  tldr_max_words: 40
  summary_min_paragraphs: 2
  summary_max_paragraphs: 4
  social_post_max_chars: 300
  dev_post_min_words: 100