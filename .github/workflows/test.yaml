name: Dockerized Tests with Coverage

on:
  push:
    branches: [develop, test, main]
  pull_request:
    branches: [develop, test, main]

env:
  ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
  ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}

jobs:
  targeted-suites:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [core, provider, web]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image
        run: docker compose -f docker/docker-compose.test.yml build test

      - name: Run ${{ matrix.suite }} suite
        run: ./scripts/ci/run_test_suite.sh "${{ matrix.suite }}"

      - name: Tear down containers
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down

  integration-tests:
    runs-on: ubuntu-latest
    needs: [targeted-suites]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build test image
        run: docker compose -f docker/docker-compose.test.yml build test

      - name: Run full tests with coverage inside Docker
        run: ./scripts/ci/run_test_suite.sh integration

      - name: Tear down containers
        if: always()
        run: docker compose -f docker/docker-compose.test.yml down

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

      - name: Upload indicator chart artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indicator-charts
          path: output/integration_tests/**/*.png
          if-no-files-found: ignore
