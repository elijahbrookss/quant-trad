name: Tests with Coverage

on:
  push:
    branches: [develop, test, main]
  pull_request:
    branches: [develop, test, main]

jobs:
  targeted-suites:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [core, provider, web]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ${{ matrix.suite }} suite
        run: ./scripts/ci/run_test_suite.sh "${{ matrix.suite }}"

  integration-tests:
    runs-on: ubuntu-latest
    needs: [targeted-suites]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full tests with coverage
        run: ./scripts/ci/run_test_suite.sh integration

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

      - name: Upload indicator chart artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indicator-charts
          path: output/integration_tests/**/*.png
          if-no-files-found: ignore
