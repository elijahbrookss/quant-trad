[pytest]
pythonpath = ./src .
addopts = --strict-markers
markers =
    integration: mark test as an integration test deselect with -m "not integration"
    unit: mark test as a unit test deselect with -m "not unit"
    core: fast contract/import boundary coverage expected to run on every change
    provider: tests covering provider adapters and provider integration boundaries
    web: tests covering API/portal service import and endpoint boundaries
    smoke: lightweight smoke checks intended for CI routing safety
    db: tests requiring a live PostgreSQL-backed persistence environment; opt-in outside CI
    asyncio: run async test functions without requiring pytest-asyncio in local environments

log_cli = true
log_cli_level = DEBUG
