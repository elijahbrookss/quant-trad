<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
  <title id="title">Quant-Trad platform flow</title>
  <desc id="desc">A high-level flow from QuantLab research to strategy decisions, bot runtime execution, runtime events, BotLens, reports, and observability.</desc>
  <defs>
    <linearGradient id="qt-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="qt-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="0.48" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <style>
      .label { fill: #f8fafc; font: 700 20px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .sub { fill: #94a3b8; font: 500 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .kicker { fill: #67e8f9; font: 700 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 2px; }
      .node { fill: rgba(15, 23, 42, 0.96); stroke: rgba(148, 163, 184, 0.36); stroke-width: 1.2; }
      .node-hot { fill: rgba(15, 23, 42, 0.98); stroke: rgba(34, 211, 238, 0.72); stroke-width: 1.4; }
      .arrow { fill: none; stroke: #38bdf8; stroke-width: 2.5; marker-end: url(#arrow); }
      .arrow-soft { fill: none; stroke: rgba(148, 163, 184, 0.68); stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1120" height="430" rx="24" fill="url(#qt-bg)"/>
  <rect x="1" y="1" width="1118" height="428" rx="23" fill="none" stroke="rgba(148, 163, 184, 0.2)"/>
  <path d="M80 344 C260 298 344 388 520 340 C712 288 824 352 1040 286" fill="none" stroke="url(#qt-accent)" stroke-width="2" opacity="0.42"/>
  <path d="M80 80 H1040" stroke="rgba(148, 163, 184, 0.12)" stroke-width="1"/>

  <text x="72" y="54" class="kicker">ONE WALK-FORWARD TIMELINE</text>
  <text x="72" y="88" class="label">research -> decision -> execution -> audit</text>
  <text x="72" y="114" class="sub">Derived artifacts come from the same runtime sequence: initialize -> apply_bar -> snapshot.</text>

  <g filter="url(#shadow)">
    <rect class="node" x="72" y="170" width="140" height="104" rx="14"/>
    <text class="kicker" x="94" y="204">RESEARCH</text>
    <text class="label" x="94" y="232">QuantLab</text>
    <text class="sub" x="94" y="254">indicators</text>

    <rect class="node" x="270" y="170" width="150" height="104" rx="14"/>
    <text class="kicker" x="292" y="204">DECISION</text>
    <text class="label" x="292" y="232">Strategy</text>
    <text class="sub" x="292" y="254">typed outputs</text>

    <rect class="node-hot" x="480" y="158" width="172" height="128" rx="16"/>
    <text class="kicker" x="504" y="196">EXECUTION</text>
    <text class="label" x="504" y="225">Bot Runtime</text>
    <text class="sub" x="504" y="249">fills, fees, risk</text>
    <text class="sub" x="504" y="269">wallet + lifecycle</text>

    <rect class="node-hot" x="724" y="158" width="168" height="128" rx="16"/>
    <text class="kicker" x="748" y="196">LEDGER</text>
    <text class="label" x="748" y="225">Runtime</text>
    <text class="label" x="748" y="249">Events</text>
    <text class="sub" x="748" y="271">Postgres/TimescaleDB</text>

    <rect class="node" x="960" y="126" width="120" height="88" rx="14"/>
    <text class="kicker" x="982" y="158">DEBUG</text>
    <text class="label" x="982" y="184">BotLens</text>

    <rect class="node" x="960" y="236" width="120" height="88" rx="14"/>
    <text class="kicker" x="982" y="268">OUTPUT</text>
    <text class="label" x="982" y="294">Reports</text>

    <rect class="node" x="480" y="330" width="172" height="64" rx="14"/>
    <text class="kicker" x="504" y="358">OPS</text>
    <text class="label" x="504" y="382">Observability</text>
  </g>

  <path class="arrow" d="M212 222 H260"/>
  <path class="arrow" d="M420 222 H470"/>
  <path class="arrow" d="M652 222 H714"/>
  <path class="arrow" d="M892 204 C928 198 932 178 950 172"/>
  <path class="arrow" d="M892 240 C928 246 932 272 950 280"/>
  <path class="arrow-soft" d="M566 286 V320"/>

  <g opacity="0.9">
    <rect x="72" y="322" width="330" height="44" rx="10" fill="rgba(2, 6, 23, 0.42)" stroke="rgba(148, 163, 184, 0.18)"/>
    <text x="92" y="350" class="sub">Known-at timing is preserved across every hop.</text>
  </g>
</svg>
